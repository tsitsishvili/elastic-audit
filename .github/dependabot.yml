version: 2
updates:
  # Keep the GitHub Actions used in workflows up to date.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci

  # Keep Composer dev dependencies up to date. Runtime constraints stay broad
  # on purpose (this is a library), so only dev tooling is bumped automatically.
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
    allow:
      - dependency-type: development
