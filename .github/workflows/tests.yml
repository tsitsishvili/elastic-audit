name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    name: PHP ${{ matrix.php }} - ${{ matrix.dependencies }} deps
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # composer update resolves Laravel/Elasticsearch within the constraints
        # in composer.json for each PHP version. "lowest" pins the declared
        # floor so the minimum supported versions stay verified.
        php: ['8.2', '8.3', '8.4']
        dependencies: [highest, lowest]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        # composer.lock is not committed for a library, so skip the lock check.
        run: composer validate --strict --no-check-publish --no-check-lock

      - name: Install dependencies
        uses: ramsey/composer-install@v4
        with:
          dependency-versions: ${{ matrix.dependencies }}

      - name: Run tests
        run: composer test
